name: Daily AI Tips Post

on:
  workflow_dispatch: # Triggered by cron-job.org or manual click

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Generate Content and Render Image (Step 1)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_FALLBACK_API_KEY: ${{ secrets.OPENROUTER_FALLBACK_API_KEY }}
          OPENROUTER_FALLBACK_API_KEY_1: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_1 }}
          OPENROUTER_FALLBACK_API_KEY_2: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_2 }}
          OPENROUTER_FALLBACK_API_KEY_3: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_3 }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
          POST_TYPE: tips
        run: |
          python main.py

      - name: Commit and Push Image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ output/
          git commit -m "Auto-update daily AI drop image and history" || echo "No changes to commit"
          git push

      - name: Wait for GitHub Pages Deployment and Verify URL
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
        run: |
          VIDEO_URL=$(python -c 'import json; print(json.load(open("output/post_metadata.json"))["video_url"])')
          echo "Polling URL: $VIDEO_URL"
          
          # Wait up to 12 minutes for deployment
          for i in {1..72}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" "$VIDEO_URL")
            if [ "$STATUS" -eq 200 ]; then
              echo "Video is publicly available (HTTP 200)."
              exit 0
            fi
            echo "Attempt $i: Received HTTP $STATUS. Waiting 10 seconds..."
            sleep 10
          done
          
          echo "Error: Video failed to become available after 12 minutes."
          exit 1

      - name: Publish to Instagram (Step 2)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_FALLBACK_API_KEY: ${{ secrets.OPENROUTER_FALLBACK_API_KEY }}
          OPENROUTER_FALLBACK_API_KEY_1: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_1 }}
          OPENROUTER_FALLBACK_API_KEY_2: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_2 }}
          OPENROUTER_FALLBACK_API_KEY_3: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_3 }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
        run: |
          python publish_instagram.py
