<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everything About AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <nav class="navbar glass">
        <h1>Everything About <span>AI</span></h1>
        <a href="https://www.instagram.com/everything__about_ai?igsh=Znh3b2ZmY2Y3MnB0&utm_source=qr" target="_blank" class="ig-icon" aria-label="Follow on Instagram">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#ig-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#f09433"/>
                        <stop offset="25%" stop-color="#e6683c"/>
                        <stop offset="50%" stop-color="#dc2743"/>
                        <stop offset="75%" stop-color="#cc2366"/>
                        <stop offset="100%" stop-color="#bc1888"/>
                    </linearGradient>
                </defs>
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        </a>
    </nav>

    <header class="hero">
        <h2>Your Daily AI Arsenal</h2>
        <p>The latest drops, actionable tips, and copy-paste prompts updated daily.</p>
    </header>

    <main class="grid-container">
        <!-- AI Drops Column -->
        <section class="column glass" id="col-drops">
            <div class="column-header">
                <h3>AI Drops</h3>
                <p>The latest tools & news</p>
            </div>
            <div class="feed" id="feed-drops">
                <div class="loader">Loading...</div>
            </div>
        </section>

        <!-- AI Tips Column -->
        <section class="column glass" id="col-tips">
            <div class="column-header">
                <h3>AI Tips</h3>
                <p>Actionable daily hacks</p>
            </div>
            <div class="feed" id="feed-tips">
                <div class="loader">Loading...</div>
            </div>
        </section>

        <!-- AI Prompts Column -->
        <section class="column glass" id="col-prompts">
            <div class="column-header">
                <h3>AI Prompts</h3>
                <p>Copy & paste workflows</p>
            </div>
            <div class="feed" id="feed-prompts">
                <div class="loader">Loading...</div>
            </div>
        </section>
    </main>

    <!-- Footer Watermark -->
    <footer class="footer">
        <p>@Everything__about_ai</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
